<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Método 3 Meses · Guillermo Francés</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --t900:#04342C;--t800:#085041;--t600:#0F6E56;--t400:#1D9E75;--t100:#9FE1CB;--t50:#E1F5EE;
  --gold:#B8956A;--gold-dk:#7A5430;--beige:#EDE8DE;
  --p400:#534AB7;--p50:#EEEDFE;--p800:#3C3489;
  --a400:#BA7517;--a50:#FAEEDA;--a800:#633806;
  --g900:#1a1a18;--g700:#444441;--g500:#5F5E5A;--g400:#888780;--g200:#D3D1C7;--g100:#F1EFE8;
  --bg:#FAFAF8;--sf:#fff;
  --bd:rgba(0,0,0,.09);--bdm:rgba(0,0,0,.15);
  --f:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--g900);min-height:100vh;line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
.view{display:none}.view.active{display:block}

/* LOADING */
#vload{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.spin{width:32px;height:32px;border:2.5px solid var(--t100);border-top-color:var(--t400);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-txt{font-size:13px;color:var(--g400)}

/* NAV */
.nav{position:sticky;top:0;z-index:50;background:rgba(250,250,248,.95);backdrop-filter:blur(12px);border-bottom:.5px solid var(--bd);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-size:14px;font-weight:600;color:var(--t800);letter-spacing:-.01em}
.nav-tabs{display:flex;gap:2px;background:var(--g100);border-radius:8px;padding:3px}
.ntab{font-size:12px;padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--g500);cursor:pointer;font-family:var(--f);transition:all .15s;font-weight:500}
.ntab.on{background:var(--sf);color:var(--g900);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* HEADER */
.hdr{background:var(--t900);padding:2.5rem 2rem 2rem;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.hdr-in{display:flex;align-items:flex-start;justify-content:space-between;gap:1.5rem;position:relative}
.hdr-left{flex:1;min-width:0}
.hdr-logo{flex-shrink:0;width:72px;height:72px;border-radius:50%;overflow:hidden;border:1.5px solid rgba(184,149,106,.4);background:var(--beige)}
.hdr-logo img{width:100%;height:100%;object-fit:cover;display:block}
.hdr-eyebrow{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t100);margin-bottom:10px}
.hdr-title{font-size:26px;font-weight:600;color:#fff;margin-bottom:6px;letter-spacing:-.02em}
.hdr-sub{font-size:14px;color:rgba(255,255,255,.55)}
.hdr-meta{display:flex;gap:12px;margin-top:1.75rem;flex-wrap:wrap}
.mpill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 12px;font-size:12px;color:rgba(255,255,255,.7)}

/* PROGRESS */
.prog-strip{background:var(--sf);border-bottom:.5px solid var(--bd);padding:.875rem 2rem;display:flex;align-items:center;gap:1rem}
.prog-lbl{font-size:12px;color:var(--g400);white-space:nowrap}
.prog-track{flex:1;height:4px;background:var(--g100);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--t400);border-radius:2px;transition:width .6s ease}
.prog-pct{font-size:12px;font-weight:500;color:var(--t600);white-space:nowrap}

/* ACTIVE STRIP */
.astrip{background:var(--sf);border-bottom:.5px solid var(--bd);padding:.75rem 2rem;display:flex;align-items:center;gap:10px}
.adot{width:7px;height:7px;border-radius:50%;background:var(--t400);flex-shrink:0}
.albl{font-size:11px;font-weight:500;color:var(--g400);text-transform:uppercase;letter-spacing:.08em}
.awk{font-size:14px;font-weight:500;color:var(--g900);margin-left:auto;text-align:right}

/* MAIN */
.main{padding:1.5rem 2rem 2rem;max-width:780px;margin:0 auto}
.slbl{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);margin-bottom:10px}
.sgap{margin-bottom:1.25rem}
.card{background:var(--sf);border-radius:12px;border:.5px solid var(--bd);overflow:hidden;margin-bottom:12px}

/* RETO */
.rcard{background:var(--t50);border-color:rgba(29,158,117,.2)}
.rhead{padding:1.1rem 1.5rem .875rem;border-bottom:.5px solid rgba(29,158,117,.15)}
.rtag{display:inline-flex;align-items:center;gap:5px;background:var(--t400);color:#fff;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.rtitle{font-size:15px;font-weight:600;color:var(--t800);line-height:1.35}
.rbody{padding:1rem 1.5rem}
.rtxt{font-size:14px;color:var(--t800);line-height:1.7;opacity:.9}

/* PILDORA */
.chead{padding:1.1rem 1.5rem;display:flex;align-items:flex-start;gap:12px}
.cicon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--t50)}
.cmeta{flex:1;min-width:0}
.ctag{font-size:10px;font-weight:500;color:var(--g400);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.ctitle{font-size:15px;font-weight:600;color:var(--g900)}
.cbody{padding:0 1.5rem 1.25rem}
.ctxt{font-size:14px;color:var(--g500);line-height:1.7;margin-bottom:1rem}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cpill{background:var(--t50);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--t800);font-weight:500;line-height:1.3}
.cpill.gld{background:#F5EDD8;color:var(--gold-dk)}

/* MENU */
.mbadge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;margin-bottom:12px}
.mitem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:.5px solid var(--bd);font-size:14px;color:var(--g700);line-height:1.45}
.mitem:last-child{border-bottom:none}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--t400);flex-shrink:0;margin-top:5px}

/* WEEKS */
.wks{padding:1.5rem 2rem 6rem;max-width:780px;margin:0 auto}
.pblk{margin-bottom:1.75rem}
.prow{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-bottom:10px;border-bottom:.5px solid var(--bd)}
.ppip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pname{font-size:12px;font-weight:500;color:var(--g500)}
.prange{font-size:11px;color:var(--g400);margin-left:auto}
.wrow{display:flex;align-items:center;gap:12px;padding:12px 1.25rem;background:var(--sf);border-radius:10px;border:.5px solid var(--bd);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.wrow.lkd{opacity:.38;pointer-events:none}
.wrow.wact{border-color:var(--t400)}
.wrow:not(.lkd):active{background:var(--g100)}
.wnum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.wnum.dn{background:var(--t400);color:#fff}
.wnum.ac{background:var(--t50);color:var(--t800)}
.wnum.lk{background:var(--g100);color:var(--g400)}
.winf{flex:1;min-width:0}
.wtit{font-size:14px;font-weight:500;color:var(--g900)}
.wsub{font-size:11px;color:var(--g400);margin-top:2px}
.warr{color:var(--g200);flex-shrink:0}
.wchk{color:var(--t400);font-size:15px;flex-shrink:0}

/* DETAIL */
.dbk{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--t600);font-weight:500;padding:1.25rem 2rem 0;cursor:pointer;background:none;border:none;font-family:var(--f)}
.dhero{padding:1.25rem 1.5rem;background:var(--sf);margin:1rem 2rem 0;border-radius:12px;border:.5px solid var(--bd)}
.dey{font-size:11px;color:var(--g400);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.dtit{font-size:22px;font-weight:600;color:var(--g900);letter-spacing:-.02em;line-height:1.2;margin-bottom:8px}
.dbadge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px}
.dwrap{padding:0 2rem;max-width:780px;margin:0 auto}
.dslbl{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);margin:1.25rem 0 .625rem;padding-bottom:6px;border-bottom:.5px solid var(--bd)}
.pcard{background:var(--t50);border-radius:10px;padding:1.1rem 1.25rem}
.pintro{font-size:14px;color:var(--t800);line-height:1.7;margin-bottom:.875rem}
.pcons{display:flex;flex-direction:column;gap:6px}
.pcon{background:rgba(255,255,255,.6);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t800);line-height:1.5}
.pcon strong{display:block;font-weight:600;margin-bottom:2px}
.dreto{background:var(--t50);border-radius:10px;padding:1.1rem 1.25rem}
.drtag{font-size:10px;font-weight:600;color:var(--t600);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.drtxt{font-size:14px;color:var(--t800);line-height:1.65;font-weight:500}

/* CHECKLIST */
.chi{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:.5px solid var(--bd);cursor:pointer}
.chi:last-child{border-bottom:none}
.chb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bdm);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chb.on{background:var(--t400);border-color:var(--t400)}
.chb.on::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.chl{font-size:14px;color:var(--g700);line-height:1.45;flex:1}
.chl.dn{text-decoration:line-through;color:var(--g400)}

/* ADMIN */
.ovl{position:fixed;inset:0;background:rgba(4,52,44,.93);display:flex;align-items:center;justify-content:center;z-index:200}
.acard{background:var(--sf);border-radius:20px;padding:2rem;width:calc(100% - 2.5rem);max-width:320px}
.alogo{width:52px;height:52px;border-radius:50%;overflow:hidden;margin:0 auto 1.25rem;border:1.5px solid var(--g200)}
.alogo img{width:100%;height:100%;object-fit:cover}
.atit{font-size:17px;font-weight:600;text-align:center;margin-bottom:4px}
.asub{font-size:13px;color:var(--g400);text-align:center;margin-bottom:1.5rem;line-height:1.5}
.ainp{width:100%;padding:11px 14px;border:.5px solid var(--bdm);border-radius:10px;font-size:15px;font-family:var(--f);outline:none;transition:border-color .15s;margin-bottom:10px;background:var(--bg)}
.ainp:focus{border-color:var(--t400)}
.abtn{width:100%;padding:12px;background:var(--t400);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--f)}
.aerr{font-size:12px;color:#E24B4A;text-align:center;margin-top:8px;min-height:16px}
.acls{display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--g400);cursor:pointer;background:none;border:none;font-family:var(--f);width:100%}
.abar{position:fixed;bottom:0;left:0;right:0;background:var(--t900);padding:.875rem 2rem;display:flex;align-items:center;gap:10px;z-index:100;border-top:.5px solid rgba(255,255,255,.08)}
.asel{flex:1;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.18);border-radius:8px;color:#fff;font-size:13px;padding:8px 10px;font-family:var(--f);cursor:pointer}
.asel option{background:#04342C;color:#fff}
.aulk{background:var(--t400);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;font-family:var(--f);white-space:nowrap}
.aext{background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.18);border-radius:8px;color:rgba(255,255,255,.75);font-size:12px;padding:8px 12px;cursor:pointer;font-family:var(--f)}
.accbtn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:90;background:var(--sf);border:.5px solid var(--bdm);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.bsp{height:5rem}

@media(max-width:600px){
  .nav,.prog-strip,.astrip{padding-left:1.25rem;padding-right:1.25rem}
  .hdr{padding:2rem 1.25rem 1.75rem}
  .main,.wks{padding-left:1.25rem;padding-right:1.25rem}
  .dbk{padding-left:1.25rem}
  .dhero{margin-left:1.25rem;margin-right:1.25rem}
  .dwrap{padding-left:1.25rem;padding-right:1.25rem}
  .cgrid{grid-template-columns:1fr}
  .hdr-logo{width:58px;height:58px}
  .abar{padding:.875rem 1.25rem}
}
</style>
</head>

  1:['Verduras de hoja oscura — espinacas, kale, rúcula','Legumbres — lentejas, garbanzos, alubias negras','Huevos camperos','Pescado azul — sardinas, caballa, salmón','Frutos secos sin sal — nueces, almendras','Aceite de oliva virgen extra','Frutas enteras de temporada'],

const WK=[
  {p:1,t:'¿Dónde estás ahora?',pi:'El punto de partida más honesto es el que no está modificado. Esta semana observamos sin juzgar ni cambiar nada: qué comes, cuándo, y por qué. Esa información vale más que cualquier dieta perfecta.',co:[{t:'Registro sin juicio',d:'Anotar lo que comes tal como lo haces, no como crees que deberías hacerlo. Los datos reales son los útiles.'},{t:'Horarios y contexto',d:'Cuándo comes y en qué situación importa tanto como qué comes. El entorno condiciona las decisiones.'},{t:'Patrones ocultos',d:'A menudo comemos de forma automática. El registro hace visible lo invisible y es el primer paso hacia el cambio.'}],re:'Registra tu alimentación durante 3 días tal y como la haces habitualmente. No cambies nada. Queremos datos reales, no datos perfectos.',ch:['He registrado al menos 3 días de alimentación habitual sin modificar nada','He identificado mis horarios de comida habituales','He anotado al menos un momento donde como sin tener hambre real']},
  {p:1,t:'Cómo funciona la energía',pi:'Los macronutrientes no son buenos ni malos: son herramientas con funciones distintas. Entender qué hace cada uno te permite elegir con criterio, no con miedo.',co:[{t:'Proteína',d:'Construye y repara tejidos. Es el macronutriente más saciante y el que más ayuda a mantener músculo.'},{t:'Carbohidratos',d:'La fuente de energía preferida del cerebro y los músculos. No son el enemigo: la calidad y la cantidad importan.'},{t:'Grasas',d:'Regulan hormonas, protegen órganos y permiten absorber vitaminas liposolubles. Imprescindibles, no opcionales.'}],re:'Elige 5 comidas de tu semana y trata de identificar qué macronutriente predomina en cada una. Sin pesar ni calcular: es un ejercicio de reconocimiento.',ch:['Distingo proteínas, carbohidratos y grasas en comidas reales sin calcular','He identificado qué macronutriente me falta habitualmente','He añadido los primeros alimentos al menú base de esta fase']},
  {p:1,t:'Los mejores alimentos según la ciencia',pi:'Hay alimentos con un retorno nutricional excepcional: aportan más nutrientes por caloría, cuestan poco y tienen sólido respaldo científico. Esta semana los incorporas al menú de forma natural.',co:[{t:'Densidad nutricional',d:'Un alimento de alta densidad nutricional aporta muchos micronutrientes por caloría. El kale tiene más calcio que la leche por gramo.'},{t:'Accesibilidad',d:'Los mejores alimentos no son los más caros. Lentejas, huevos, sardinas y avena están entre los más respaldados por la evidencia.'},{t:'Sin restricción',d:'Añadir alimentos nutritivos es más efectivo y sostenible que eliminar alimentos. El menú crece, no se recorta.'}],re:'Incorpora 2 alimentos de la lista base que no forman parte de tu rutina habitual. Elige los que más te apetezca probar.',ch:['He probado al menos 1 alimento nuevo de la lista base esta semana','Entiendo por qué esos alimentos tienen alta densidad nutricional','Mi menú base tiene ya una primera versión real con alimentos concretos']},
  {p:1,t:'Hambre, saciedad y señales reales',pi:'Saber qué comer no es suficiente si no entendemos cuándo y por qué comemos. El hambre emocional, el entorno y el estrés condicionan nuestras decisiones más de lo que creemos.',co:[{t:'Hambre fisiológica',d:'Aparece gradualmente, cualquier alimento la satisface, y llega varias horas después de la última comida. Es la señal real del cuerpo.'},{t:'Hambre emocional',d:'Aparece de repente, pide alimentos concretos, y no desaparece del todo aunque comas. No es hambre de comida.'},{t:'El entorno decide',d:'El tamaño del plato, la disponibilidad de alimentos y el estrés diario condicionan lo que comes más que la fuerza de voluntad.'}],re:'Antes de cada comida principal esta semana, pregúntate: ¿tengo hambre física o hay algo más? Anota 3 momentos en los que lo identifiques claramente.',ch:['Distingo hambre fisiológica de hambre emocional en situaciones concretas','He identificado al menos 2 situaciones de hambre emocional esta semana','Cierro el primer mes con un menú base que estoy incorporando de forma real']},
  {p:2,t:'Proteína: la gran incomprendida',pi:'Casi todos comemos menos proteína de la necesaria, y la que comemos está mal distribuida. Esta semana aprendes cuánta necesitas, cuándo tomarla, y cuáles son las mejores fuentes.',co:[{t:'Cuánta necesitas',d:'Entre 1.6 y 2.2 g por kg de peso corporal al día para una persona activa. La mayoría llega a menos de 1 g sin saberlo.'},{t:'Distribución',d:'El cuerpo no puede usar más de 35-40 g por comida para síntesis muscular. Mejor 3-4 comidas con proteína que una sola grande.'},{t:'Mejores fuentes',d:'Huevos, pollo, legumbres, pescado, yogur griego y tofu son las más eficientes en proteína por euro y por caloría.'}],re:'Rediseña una de tus comidas habituales para optimizar su aporte de proteína sin aumentar el presupuesto ni complicar la preparación.',ch:['Sé aproximadamente cuánta proteína necesito cada día','He redistribuido la proteína en al menos 3 comidas del día','Mi menú de esta fase incorpora fuentes de proteína variadas']},
  {p:2,t:'Carbohidratos sin miedo',pi:'No todos los carbohidratos son iguales. El índice glucémico, la carga glucémica y la fibra explican por qué la avena y el pan blanco no son lo mismo, aunque los dos sean carbohidratos.',co:[{t:'Índice glucémico',d:'Mide la velocidad con que un alimento sube la glucosa en sangre. Alta velocidad = pico de insulina = más hambre al poco tiempo.'},{t:'Fibra como aliada',d:'La fibra ralentiza la absorción de glucosa, alimenta la microbiota y aumenta la saciedad. Los alimentos integrales la conservan.'},{t:'Cuándo y cuáles',d:'Los carbohidratos de calidad (avena, legumbres, fruta entera, arroz integral) son ideales antes y después del ejercicio.'}],re:'Sustituye 2 fuentes de carbohidrato refinado por su versión integral durante esta semana. Anota si notas diferencia en saciedad o energía.',ch:['Entiendo la diferencia entre carbohidratos simples y de calidad','He realizado las 2 sustituciones del reto durante la semana','Sé elegir la fuente de carbohidrato según el momento del día']},
  {p:2,t:'Grasas, inflamación y longevidad',pi:'Las grasas tienen mala fama heredada de los años 80. La evidencia actual es clara: las grasas correctas protegen el corazón y el cerebro. Las incorrectas hacen lo opuesto.',co:[{t:'Omega 3',d:'Reduce la inflamación crónica, protege el corazón y mejora la función cognitiva. Fuentes: pescado azul, nueces, semillas de lino.'},{t:'Grasas saturadas',d:'No son el villano que se pensaba, pero en exceso sí elevan el colesterol LDL. Moderación, no eliminación.'},{t:'Grasas trans',d:'Las únicas que merecen evitarse activamente. Aparecen en ultraprocesados. Busca "aceite vegetal hidrogenado" en etiquetas.'}],re:'Audita las grasas de tu despensa en 10 minutos: etiquetas, aceites, snacks. Identifica cuáles quieres mantener y cuáles cambiarías.',ch:['Distingo grasas saludables de inflamatorias leyendo etiquetas','He hecho la auditoría de la despensa con criterio propio','Entiendo el papel del Omega 3 en la alimentación diaria']},
  {p:2,t:'Construye tu menú semanal',pi:'Todo lo aprendido este mes se traduce ahora en un menú real de 5 días. Tú propones, ajustamos juntos, y entiendes el porqué de cada decisión. Al finalizar la sesión, el menú es tuyo.',co:[{t:'El plato completo',d:'Cada comida principal debe tener: proteína de calidad + vegetal abundante + carbohidrato integral en proporción correcta.'},{t:'Variedad y rotación',d:'Rotar fuentes de proteína y verduras cada semana garantiza una cobertura amplia de micronutrientes sin pensar en cada uno.'},{t:'Planificación práctica',d:'Un menú semanal reduce decisiones, ahorra dinero y elimina el ¿qué como hoy? de cada día.'}],re:'Construye un menú completo de 5 días por tu cuenta antes de la próxima sesión. Usa todo lo aprendido hasta ahora.',ch:['He construido un menú de 5 días de forma autónoma','El menú equilibra los 3 macronutrientes de forma consciente','Entiendo por qué tomé cada decisión nutricional en el menú']},
  {p:3,t:'Nutrición en el mundo real',pi:'Saber comer bien en casa no es suficiente. La vida ocurre fuera: cenas, viajes, eventos. Esta semana aprendes a mantener el criterio sin obsesionarte ni renunciar a nada.',co:[{t:'La regla del 80/20',d:'Si el 80% de tus decisiones son buenas, el 20% restante tiene un impacto mínimo. La flexibilidad es parte del plan.'},{t:'En restaurantes',d:'Busca proteína + vegetal primero. Pide salsas aparte. Elige agua por defecto. Tres decisiones que cubren la mayor parte.'},{t:'Sin culpa',d:'Una comida no arruina un programa. Un patrón sí. La diferencia está en volver al criterio después, no en la perfección puntual.'}],re:'Come fuera de casa 2 veces esta semana con criterio. Tómate 30 segundos para elegir con lo que sabes antes de pedir. Anota cómo lo resolviste.',ch:['He comido fuera 2 veces con criterio nutricional consciente','Sé navegar un menú de restaurante con lo aprendido','No siento que comer fuera me saque del programa']},
  {p:3,t:'Leer etiquetas y no morir en el intento',pi:'Las etiquetas están diseñadas para confundir. El orden de ingredientes, los azúcares ocultos y los claims nutricionales son herramientas de marketing. Esta semana los lees como un profesional.',co:[{t:'Orden de ingredientes',d:'Los ingredientes aparecen de mayor a menor cantidad. Si el azúcar está en los primeros 3 puestos, hay mucho azúcar.'},{t:'Azúcares ocultos',d:'Hay más de 60 nombres para el azúcar en etiquetas: maltosa, dextrosa, jarabe de maíz... Si ves varios, suman.'},{t:'Claims engañosos',d:'"Sin azúcar añadido" puede tener mucho azúcar natural. "Light" solo significa 30% menos calorías que la versión original.'}],re:'Elige 3 pares de productos del supermercado (mismo tipo, marcas distintas) y compáralos con el criterio aprendido. ¿Cuál elegirías ahora?',ch:['Entiendo cómo leer una etiqueta nutricional de forma crítica','He comparado al menos 3 productos aplicando el criterio propio','Identifico azúcares ocultos y claims nutricionales engañosos']},
  {p:3,t:'Tu cuerpo a largo plazo',pi:'Lo que comes hoy impacta en cómo estarás en 20 años. Microbiota, inflamación crónica, sueño y longevidad están directamente conectados con la alimentación.',co:[{t:'Microbiota intestinal',d:'Los 38 billones de bacterias de tu intestino influyen en la inmunidad, el estado de ánimo y el metabolismo. La fibra variada es su alimento.'},{t:'Inflamación crónica',d:'La inflamación de bajo grado es el denominador común de las enfermedades crónicas. La alimentación antiinflamatoria la reduce.'},{t:'Sueño y nutrición',d:'Dormir mal aumenta el hambre al día siguiente y reduce la sensibilidad a la insulina. Son sistemas conectados.'}],re:'Incorpora 3 hábitos de longevidad esta semana: uno para la microbiota, uno antiinflamatorio y uno para mejorar el sueño.',ch:['Entiendo la conexión entre alimentación y longevidad a largo plazo','He incorporado los 3 hábitos del reto durante la semana','Tengo claro qué cambios quiero mantener para siempre']},
  {p:3,t:'Cierre y entrega de autonomía',pi:'Este es el momento en que el programa termina y tu autonomía nutricional empieza. Revisamos el camino recorrido, presentas tu protocolo personal, y te llevas las herramientas para el resto de tu vida.',co:[{t:'Tu protocolo propio',d:'Un documento con tus principios nutricionales, tu menú base, tus estrategias para el mundo real y los hábitos que has decidido mantener.'},{t:'Lo que has aprendido',d:'En 12 semanas has construido criterio propio sobre macronutrientes, alimentos, etiquetas y nutrición en el mundo real.'},{t:'El siguiente paso',d:'La autonomía no significa perfección. Significa que cuando dudes, tienes herramientas para razonar la respuesta tú mismo.'}],re:'Tu entrega final: un documento con tus principios nutricionales, tu menú base, tus estrategias y los hábitos que has decidido mantener. Es tuyo para siempre.',ch:['He presentado mi protocolo nutricional personal en la sesión de cierre','Puedo gestionar mi alimentación de forma autónoma sin pauta externa','Soy consciente del camino recorrido y de lo que he aprendido estos 3 meses']}
];
const PC=p=>p===1?'#1D9E75':p===2?'#534AB7':'#BA7517';
const PB=p=>p===1?'#E1F5EE':p===2?'#EEEDFE':'#FAEEDA';
const PT=p=>p===1?'#085041':p===2?'#3C3489':'#633806';
const PL=p=>p===1?'Fase 1 · Diagnóstico y base':p===2?'Fase 2 · Cambio activo':'Fase 3 · Consolidación y autonomía';
const PR=p=>p===1?'Semanas 1–4':p===2?'Semanas 5–8':'Semanas 9–12';

let S={u:0,ch:{},adm:false};
const SK='m3m_v6';
const ld=()=>{}; // state loaded from Supabase
const sv=()=>{ if(window._CID) dbSet(window._CID,S.u,S.ch).catch(()=>{}); };
let CUR='i';

function go(v){
  CUR=v;
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(e=>e.classList.remove('on'));
  if(v==='i'){document.getElementById('vi').classList.add('active');document.querySelectorAll('.ntab').forEach(t=>{if(t.textContent.trim()==='Inicio')t.classList.add('on')});renderI();}
  else if(v==='s'){document.getElementById('vs').classList.add('active');document.querySelectorAll('.ntab').forEach(t=>{if(t.textContent.trim()==='Semanas')t.classList.add('on')});renderS();}
}
function openD(i){document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));document.getElementById('vd').classList.add('active');renderD(i);}

function renderI(){
  const idx=Math.min(S.u,11),w=WK[idx],wn=Math.min(S.u+1,12),pct=Math.min(Math.round(S.u/12*100),100),ph=w.p;
  document.getElementById('Hdr').innerHTML=`<div class="hdr"><div class="hdr-in"><div class="hdr-left"><p class="hdr-eyebrow">Guillermo Francés · Nutricionista</p><p class="hdr-title">Método 3 Meses</p><p class="hdr-sub">Tu programa personalizado de nutrición basado en evidencia</p><div class="hdr-meta"><span class="mpill"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>12 semanas</span><span class="mpill"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>60 min / sesión</span><span class="mpill"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Autonomía al finalizar</span></div></div><div class="hdr-logo"><img src="${LOGO}" alt="Guillermo Francés"></div></div></div>`;
  document.getElementById('Prog').innerHTML=`<div class="prog-strip"><span class="prog-lbl">Progreso</span><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-pct">${S.u} / 12 semanas</span></div>`;
  document.getElementById('Ast').innerHTML=`<div class="astrip"><div class="adot"></div><span class="albl">Tu programa activo</span><span class="awk">Semana ${wn} · ${w.t}</span></div>`;
  document.getElementById('Reto').innerHTML=`<p class="slbl">Tu reto esta semana</p><div class="card rcard"><div class="rhead"><div class="rtag"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Reto activo</div><p class="rtitle">${w.t}</p></div><div class="rbody"><p class="rtxt">${w.re}</p></div></div>`;
  document.getElementById('Pil').innerHTML=`<p class="slbl">Lo que aprendes esta semana</p><div class="card"><div class="chead"><div class="cicon"><svg fill="none" stroke="#0F6E56" stroke-width="2" viewBox="0 0 24 24" width="18" height="18"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><div class="cmeta"><p class="ctag">${PL(ph)}</p><p class="ctitle">${w.t}</p></div></div><div class="cbody"><p class="ctxt">${w.pi}</p><div class="cgrid">${w.co.map((c,i)=>`<div class="cpill${i%2===1?' gld':''}">${c.t}</div>`).join('')}</div></div></div>`;
  document.getElementById('Menu').innerHTML=`<p class="slbl">Tu menú de referencia</p><div class="card"><div class="cbody" style="padding-top:1.25rem"><span class="mbadge" style="background:${PB(ph)};color:${PT(ph)}">${PL(ph)}</span>${MN[ph].map(m=>`<div class="mitem"><div class="mdot"></div><span>${m}</span></div>`).join('')}</div></div>`;
}

function renderS(){
  let h='',cp=0;
  WK.forEach((w,i)=>{
    const n=i+1,dn=n<=S.u,ac=n===S.u+1,lk=n>S.u+1;
    if(w.p!==cp){if(cp)h+='</div>';cp=w.p;h+=`<div class="pblk"><div class="prow"><div class="ppip" style="background:${PC(w.p)}"></div><span class="pname">${PL(w.p)}</span><span class="prange">${PR(w.p)}</span></div>`;}
    h+=`<div class="wrow${lk?' lkd':ac?' wact':''}" onclick="openD(${i})"><div class="wnum ${dn?'dn':ac?'ac':'lk'}">${dn?'✓':n}</div><div class="winf"><div class="wtit">${w.t}</div><div class="wsub">${dn?'Completada':ac?'Activa':'Bloqueada'}</div></div>${dn?'<span class="wchk">✓</span>':'<svg class="warr" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'}</div>`;
  });
  h+='</div>';
  document.getElementById('wlist').innerHTML=h;
}

function renderD(i){
  const w=WK[i],n=i+1,dn=n<=S.u,ac=n===S.u+1,chs=S.ch['w'+n]||{};
  let h=`<button class="dbk" onclick="go('s')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Todas las semanas</button><div class="dhero"><p class="dey">Semana ${n}</p><p class="dtit">${w.t}</p><span class="dbadge" style="background:${PB(w.p)};color:${PT(w.p)}">${PL(w.p)}</span></div><div class="dwrap"><p class="dslbl">Tu reto esta semana</p><div class="dreto"><p class="drtag">Reto activo</p><p class="drtxt">${w.re}</p></div><p class="dslbl">Lo que aprendes esta semana</p><div class="pcard"><p class="pintro">${w.pi}</p><div class="pcons">${w.co.map(c=>`<div class="pcon"><strong>${c.t}</strong>${c.d}</div>`).join('')}</div></div>`;
  if(dn||ac){
    h+=`<p class="dslbl">Tu progreso esta semana</p><div>`;
    w.ch.forEach((c,ci)=>{const on=chs[ci];h+=`<div class="chi" onclick="tgCh(${i},${ci})"><div class="chb${on?' on':''}" id="cb-${i}-${ci}"></div><span class="chl${on?' dn':''}" id="cl-${i}-${ci}">${c}</span></div>`;});
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById('dcont').innerHTML=h;
}

function tgCh(wi,ci){
  const k='w'+(wi+1);if(!S.ch[k])S.ch[k]={};
  S.ch[k][ci]=!S.ch[k][ci];sv();
  const b=document.getElementById(`cb-${wi}-${ci}`),l=document.getElementById(`cl-${wi}-${ci}`);
  if(b)b.className='chb'+(S.ch[k][ci]?' on':'');
  if(l)l.className='chl'+(S.ch[k][ci]?' dn':'');
}
function openOvl(){if(!S.adm){document.getElementById('ovl').style.display='flex';setTimeout(()=>document.getElementById('ainp').focus(),100);}}
function closeOvl(){document.getElementById('ovl').style.display='none';document.getElementById('ainp').value='';document.getElementById('aerr').textContent='';}
function chkAdm(){
  if(document.getElementById('ainp').value===PASS){S.adm=true;closeOvl();document.getElementById('abar').style.display='flex';document.getElementById('accbtn').style.display='none';fillSel();}
  else{document.getElementById('aerr').textContent='Contraseña incorrecta';setTimeout(()=>document.getElementById('aerr').textContent='',2000);}
}
function exitAdm(){S.adm=false;document.getElementById('abar').style.display='none';document.getElementById('accbtn').style.display='flex';}
function fillSel(){const sel=document.getElementById('asel');sel.innerHTML='';for(let i=1;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent=`Semana ${i}${i<=S.u?' ✓':''}`;sel.appendChild(o);}sel.value=Math.min(S.u+1,12);}
function doUnlock(){S.u=parseInt(document.getElementById('asel').value);sv();fillSel();if(CUR==='i')renderI();else if(CUR==='s')renderS();}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('ovl').style.display==='flex')chkAdm();if(e.key==='Escape'&&document.getElementById('ovl').style.display==='flex')closeOvl();});
(async()=>{
  const CID=new URLSearchParams(window.location.search).get('c');
  if(!CID){document.getElementById('vload').style.display='none';document.getElementById('verr').style.display='flex';return;}
  const data=await dbGet(CID).catch(()=>null);
  if(!data){document.getElementById('vload').style.display='none';document.getElementById('verr').style.display='flex';return;}
  S.u=data.semana||0;S.ch=data.checks||{};window._CID=CID;
  document.getElementById('vload').style.display='none';
  document.getElementById('app').style.display='block';
  renderI();
})();
</script>

<div id="verr" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;gap:12px">
  <p style="font-size:18px;font-weight:600;color:#1a1a18">Enlace no válido</p>
  <p style="font-size:14px;color:#888780;line-height:1.6;max-width:280px">Este programa requiere un enlace personalizado.<br>Contacta con Guillermo para obtener el tuyo.</p>
</div>
</body>
</html>
